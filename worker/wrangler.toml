name = "q-park-overlast-api"
main = "worker.js"
compatibility_date = "2025-05-01"

# De D1-database wordt aangemaakt met:
#   npx wrangler d1 create q-park-overlast-db
# Wrangler print dan een database_id; plak die hieronder.
[[d1_databases]]
binding = "DB"
database_name = "q-park-overlast-db"
database_id = "vervang-met-id-uit-wrangler-output"

# CORS:
# Zet ALLOWED_ORIGIN op de URL waar de site staat (zonder slash aan het eind),
# bv. "https://q-park-overlast.pages.dev" of het eigen domein.
# Wildcard "*" mag tijdens ontwikkeling, maar wordt vervangen zodra de site live staat.
[vars]
ALLOWED_ORIGIN = "*"

# Admin key voor de /api/admin/list endpoint:
#   npx wrangler secret put ADMIN_KEY
# (Niet hier zetten — secrets horen niet in een config-file.)
